bre":"Osly","partido":"Francia vs Marruecos","resultado":"Francia","marcador":"3-2","acierto":"1","puntos_j":"1"},{"fecha":"9 de Julio","nombre":"Tessa","partido":"Francia vs Marruecos","resultado":"Francia","marcador":"2-1","acierto":"1","puntos_j":"1"}];const FMAP=[{"fecha":"1 de Julio","label":"1 de Julio"},{"fecha":"11 de Junio","label":"11 de Junio"},{"fecha":"12 de Junio","label":"12 de Junio"},{"fecha":"13 de Junio","label":"13 de Junio"},{"fecha":"14 de Junio","label":"14 de Junio"},{"fecha":"15 de Junio","label":"15 de Junio"},{"fecha":"16 de Junio","label":"16 de Junio"},{"fecha":"17 de Junio","label":"17 de Junio"},{"fecha":"18 de Junio","label":"18 de Junio"},{"fecha":"19 de Junio","label":"19 de Junio"},{"fecha":"2 de Julio","label":"2 de Julio"},{"fecha":"20 de Junio","label":"20 de Junio"},{"fecha":"21 de Junio","label":"21 de Junio"},{"fecha":"22 de Junio","label":"22 de Junio"},{"fecha":"23 de Junio","label":"23 de Junio"},{"fecha":"24 de Junio","label":"24 de Junio"},{"fecha":"25 de Junio","label":"25 de Junio"},{"fecha":"26 de Junio","label":"26 de Junio"},{"fecha":"27 de Junio","label":"27 de Junio"},{"fecha":"28 de Junio","label":"28 de Junio"},{"fecha":"29 de Junio","label":"29 de Junio"},{"fecha":"3 de Julio","label":"3 de Julio"},{"fecha":"30 de Junio","label":"30 de Junio"},{"fecha":"4 de Julio","label":"4 de Julio"},{"fecha":"5 de Julio","label":"5 de Julio"},{"fecha":"6 de Julio","label":"6 de Julio"},{"fecha":"7 de Julio","label":"7 de Julio"},{"fecha":"10 de Julio","label":"10 de Julio"},{"fecha":"11 de Julio","label":"11 de Julio"},{"fecha":"14 de Julio","label":"14 de Julio"},{"fecha":"9 de Julio","label":"9 de Julio"}];const FECHAS_GRUPO=["11 de Junio","12 de Junio","13 de Junio","14 de Junio","15 de Junio","16 de Junio","17 de Junio","18 de Junio","19 de Junio","20 de Junio","21 de Junio","22 de Junio","23 de Junio","24 de Junio","25 de Junio","26 de Junio","27 de Junio"];const FECHAS_R32=["28 de Junio","29 de Junio","30 de Junio","1 de Julio","2 de Julio","3 de Julio"];const FECHAS_R16=["4 de Julio","5 de Julio","6 de Julio","7 de Julio"];const FECHAS_QF=["9 de Julio","10 de Julio","11 de Julio","12 de Julio"];const FECHAS_SF=["14 de Julio","15 de Julio"];const FECHAS_FINAL=["18 de Julio","19 de Julio"];
function norm(s){
  if(!s)return "";
  s=s.toLowerCase().trim();
  s=s.replace(/[áàäâã]/g,"a")
   .replace(/[éèëê]/g,"e")
   .replace(/[íìïî]/g,"i")
   .replace(/[óòöôõ]/g,"o")
   .replace(/[úùüû]/g,"u")
   .replace(/ñ/g,"n").replace(/ç/g,"c");
  return s;
}
function isPending(r){return !r.resultado||r.resultado==="";}
function resReal(f,p){return RES.find(r=>r.fecha===f&&norm(r.partido)===norm(p))||null;}
function hitGanador(p){
  var r=resReal(p.fecha,p.partido);
  if(!r||isPending(r)) return false;
  return norm(r.resultado)===norm(p.resultado);
}
function hitMarcador(p){
  var r=resReal(p.fecha,p.partido);
  if(!r||isPending(r)||!r.marcador||r.marcador==="") return false;
  if(!hitGanador(p)) return false;
  return norm(p.marcador)===norm(r.marcador);
}
function puntosPron(p){
  if(!hitGanador(p)) return 0;
  return 1+(hitMarcador(p)?2:0);
}
function lbl(f){var x=FMAP.find(m=>m.fecha===f);return x?x.label:f;}

function buildPartidoCard(r,fecha,ri){
  var pts=r.partido.split(" vs ");
  var prons=PRON.filter(p=>p.fecha===fecha&&norm(p.partido)===norm(r.partido));
  var id="pid"+fecha.replace(/[^a-z0-9]/g,"")+ri;
  var pending=isPending(r);
  var tieneMarc=r.marcador&&r.marcador!=="";
  var icon=pending?"&#8987;":"&#9989;";
  var resLabel=pending?"Pendiente":(tieneMarc?r.resultado+" ("+r.marcador+")":r.resultado);
  var fuenClass=pending?"pendiente":"real";
  var chips=prons.map(p=>{
    if(pending) return "<div class=\"pron-chip pend\">&#8987; <span class=\"chip-nombre\">"+p.nombre+"</span></div>";
    var hG=hitGanador(p);
    var hM=hitMarcador(p);
    var pts_chip=hG?(hM?"&#11088;&#10003;":"&#10003;"):"&#10007;";
    var cls=hG?(hM?"chip-perfect":"hit"):"miss";
    var pred=p.marcador&&p.marcador!==""?p.resultado+" ("+p.marcador+")":p.resultado;
    return "<div class=\"pron-chip "+cls+"\">"+pts_chip+
      "<span class=\"chip-nombre\">"+p.nombre+"</span>"
      +"<span class=\"chip-pred\"> &#8594; "+pred+"</span></div>";
  }).join("");
  return "<div class=\"partido-card\">"
    +"<div class=\"partido-header\" onclick=\"tog('"+id+"')\">"
    +"<div class=\"team\">"+(pts[0]||"")+"</div>"
    +"<div class=\"vs-box\"><div class=\"vs-resultado "+fuenClass+"\">"+icon+" "+resLabel+"</div></div>"
    +"<div class=\"team right\">"+(pts[1]||"")+"</div></div>"
    +"<div class=\"partido-toggle\" onclick=\"tog('"+id+"')\">"
    +"Ver "+prons.length+" pron&oacute;sticos</div>"
    +"<div class=\"pronosticos\" id=\""+id+"\">"+chips+"</div></div>";
}

function buildFechaBlock(fecha){
  var ps=RES.filter(r=>r.fecha===fecha);
  var inner=ps.map((r,ri)=>buildPartidoCard(r,fecha,ri)).join("");
  return "<div class=\"fecha-section\"><div class=\"fecha-label\">"+lbl(fecha)+"</div>"+inner+"</div>";
}

function buildFaseBlock(id,icon,titulo,badge_class,fechas,abierto){
  var jug=RES.filter(r=>fechas.indexOf(r.fecha)>=0&&!isPending(r)).length;
  var tot=RES.filter(r=>fechas.indexOf(r.fecha)>=0).length;
  var chevron=abierto?"&#9650;":"&#9660;";
  var bodyClass=abierto?"fase-body open":"fase-body";
  var contenido=fechas.slice().reverse().map(buildFechaBlock).join("");
  return "<div class=\"fase-block\">"
    +"<div class=\"fase-header\" onclick=\"toggleFase('"+id+"')\">"
    +"<div class=\"fase-title-wrap\">"
    +"<span class=\"fase-icon\">"+icon+"</span>"
    +"<span class=\"fase-title\">"+titulo+"</span>"
    +"<span class=\"fase-badge "+badge_class+"\">"+jug+" / "+tot+" jugados</span>"
    +"</div>"
    +"<span class=\"fase-chevron\" id=\"chev-"+id+"\">"+chevron+"</span>"
    +"</div>"
    +"<div class=\""+bodyClass+"\" id=\""+id+"\">"+contenido+"</div>"
    +"</div>";
}

function renderPartidos(){
  var todasSet=new Set(RES.map(r=>r.fecha));
  var fG    =FECHAS_GRUPO.filter(f=>todasSet.has(f));
  var fR32  =FECHAS_R32.filter(f=>todasSet.has(f));
  var fR16  =FECHAS_R16.filter(f=>todasSet.has(f));
  var fQF   =FECHAS_QF.filter(f=>todasSet.has(f));
  var fSF   =FECHAS_SF.filter(f=>todasSet.has(f));
  var fFINAL=FECHAS_FINAL.filter(f=>todasSet.has(f));
  var conocidas=FECHAS_GRUPO.concat(FECHAS_R32).concat(FECHAS_R16).concat(FECHAS_QF).concat(FECHAS_SF).concat(FECHAS_FINAL);
  var fO=[...todasSet].filter(f=>conocidas.indexOf(f)<0);
  var html="";
  if(fFINAL.length>0) html+=buildFaseBlock("fase-final","&#127881;","3er Lugar y Final","final",fFINAL,true);
  if(fSF.length>0)    html+=buildFaseBlock("fase-sf","&#128081;","Semifinales","sf",fSF,true);
  if(fQF.length>0)    html+=buildFaseBlock("fase-qf","&#9876;&#65039;","Cuartos de Final","qf",fQF,false);
  if(fR16.length>0)   html+=buildFaseBlock("fase-r16","&#9917;","Octavos de Final","r16",fR16,false);
  if(fR32.length>0)   html+=buildFaseBlock("fase-r32","&#127760;","Dieciséisavos de Final","r32",fR32,false);
  if(fG.length>0)     html+=buildFaseBlock("fase-grupo","&#128202;","Fase de Grupos","grupo",fG,false);
  if(fO.length>0)     html+=fO.map(buildFechaBlock).join("");
  document.getElementById("partidos-container").innerHTML=html;
}

function toggleFase(id){
  var body=document.getElementById(id);
  var chev=document.getElementById("chev-"+id);
  var isOpen=body.classList.contains("open");
  body.classList.toggle("open");
  if(chev) chev.innerHTML=isOpen?"&#9660;":"&#9650;";
}

function tog(id){document.getElementById(id).classList.toggle("open");}

function renderRanking(){
  var ns=[...new Set(PRON.map(p=>p.nombre))];
  var data=ns.map(n=>{
    var ps=PRON.filter(p=>p.nombre===n);
    var jugados=ps.filter(p=>{var r=resReal(p.fecha,p.partido);return r&&!isPending(r);}).length;
    var pts=ps.reduce((acc,p)=>{var r=resReal(p.fecha,p.partido);if(!r||isPending(r))return acc;return acc+puntosPron(p);},0);
    var ganadores=ps.filter(hitGanador).length;
    var marcadores=ps.filter(hitMarcador).length;
    var pct=jugados>0?Math.round(ganadores/jugados*100):0;
    return{n:n,pts:pts,ganadores:ganadores,marcadores:marcadores,jugados:jugados,tot:ps.length,pct:pct};
  }).sort((a,b)=>b.pts-a.pts||b.ganadores-a.ganadores||a.n.localeCompare(b.n));
  var maxPts=data[0]&&data[0].pts>0?data[0].pts:1;
  var medals=["gold","silver","bronze"];
  var split=Math.ceil(data.length/2);
  var top=data.slice(0,split);
  var bot=data.slice(split);
  function card(r,i){
    return "<div class=\"rank-card "+(medals[i]||"")+"\">"
      +"<div class=\"rank-pos\">"+(i+1)+"</div>"
      +"<div><div class=\"rank-name\">"+r.n+"</div>"
      +"<div class=\"rank-bar-wrap\"><div class=\"rank-bar\" data-w=\""+(r.pts>0?Math.round(r.pts/maxPts*100):0)+"\">"+"</div></div>"
      +"<div class=\"rank-partidos\">&#10003; "+r.ganadores+" ganadores &middot; &#11088; "+r.marcadores+" marcadores &middot; "+r.jugados+" jugados</div></div>"
      +"<div class=\"rank-stat\"><div class=\"rank-aciertos\">"+r.pts+"</div>"
      +"<div class=\"rank-pct\">"+r.pct+"% efectividad</div></div></div>";
  }
  var html="<div class=\"ranking-cols\">"
    +"<div><div class=\"ranking-col-label top\">&#127942; Top "+split+"</div>"
    +"<div class=\"ranking-col\">"+top.map((r,i)=>card(r,i)).join("")+"</div></div>"
    +"<div><div class=\"ranking-col-label bottom\">Posiciones "+(split+1)+"–"+data.length+"</div>"
    +"<div class=\"ranking-col\">"+bot.map((r,i)=>card(r,split+i)).join("")+"</div></div>"
    +"</div>";
  document.getElementById("ranking-container").innerHTML=html;
  setTimeout(()=>document.querySelectorAll(".rank-bar").forEach(b=>{b.style.width=b.dataset.w+"%";}),80);
}

function renderPersonaSelect(){
  var ns=[...new Set(PRON.map(p=>p.nombre))].sort();
  document.getElementById("persona-select").innerHTML=ns.map(n=>"<option>"+n+"</option>").join("");
  renderPersona();
}

function renderPersona(){
  var n=document.getElementById("persona-select").value;
  var ordenTotal=FECHAS_GRUPO.concat(FECHAS_R32).concat(FECHAS_R16).concat(FECHAS_QF).concat(FECHAS_SF).concat(FECHAS_FINAL);
  var ps=PRON.filter(p=>p.nombre===n)
    .slice().sort((a,b)=>{
      var ia=ordenTotal.indexOf(a.fecha);
      var ib=ordenTotal.indexOf(b.fecha);
      if(ia!==ib) return ia-ib;
      return a.partido.localeCompare(b.partido);
    });
  var jugados=ps.filter(p=>{var r=resReal(p.fecha,p.partido);return r&&!isPending(r);}).length;
  var pts=ps.reduce((acc,p)=>{var r=resReal(p.fecha,p.partido);if(!r||isPending(r))return acc;return acc+puntosPron(p);},0);
  var ac_gan=ps.filter(p=>{var r=resReal(p.fecha,p.partido);return r&&!isPending(r)&&hitGanador(p);}).length;
  document.getElementById("p-aciertos").textContent=pts;
  document.getElementById("p-pct").textContent=(jugados>0?Math.round(ac_gan/jugados*100):0)+"%";
  document.getElementById("p-partidos").textContent=ps.length;
  var html=ps.map(p=>{
    var r=resReal(p.fecha,p.partido);
    var pending=!r||isPending(r);
    var hG=!pending&&hitGanador(p);
    var hM=!pending&&hitMarcador(p);
    var rc=pending?"pend":(hM?"perfect":hG?"hit":"miss");
    var pred=p.marcador&&p.marcador!==""?p.resultado+" ("+p.marcador+")":p.resultado;
    var resR=pending?"":(!r||isPending(r)?"&#8987; Pendiente":(r.marcador&&r.marcador!==""?r.resultado+" ("+r.marcador+")":r.resultado));
    var icon=pending?"&#8987;":(hM?"&#11088;&#10003;":hG?"&#10003;":"&#10007;");
    return "<div class=\"detalle-row "+rc+"\">"
      +"<span class=\"detalle-fecha\">"+lbl(p.fecha)+"</span>"
      +"<span class=\"detalle-partido\">"+p.partido+"</span>"
      +"<span class=\"detalle-pred\">"+(pending?"":pred)+"</span>"
      +"<span class=\"detalle-real\">"+resR+"</span>"
      +"<span class=\"detalle-icon\">"+icon+"</span></div>";
  }).join("");
  document.getElementById("detalle-container").innerHTML=html;
}

function renderElecciones(){
  var ordenTotal=FECHAS_GRUPO.concat(FECHAS_R32).concat(FECHAS_R16).concat(FECHAS_QF).concat(FECHAS_SF).concat(FECHAS_FINAL);
  var fechasEnPRON=new Set(PRON.map(p=>p.fecha));
  var fechasOrd=ordenTotal.filter(f=>fechasEnPRON.has(f));
  var ultima=fechasOrd[fechasOrd.length-1];
  var partidos=[...new Set(PRON.filter(p=>p.fecha===ultima).map(p=>p.partido))].sort();
  var nombres=[...new Set(PRON.map(p=>p.nombre))].sort();
  document.getElementById("eleg-fecha-label").textContent=lbl(ultima);
  var thead="<thead><tr><th class=\"ec-th-nombre\">Participante</th>"
    +partidos.map(p=>{
      var pts=p.split(" vs ");
      return "<th class=\"ec-th-partido\"><div class=\"ec-th-equipos\"><span>"+(pts[0]||p)+"</span>"
        +"<span class=\"ec-vs\">vs</span><span>"+(pts[1]||"")+"</span></div></th>";
    }).join("")+"</tr></thead>";
  var tbody="<tbody>"+nombres.map(n=>{
    var celdas=partidos.map(p=>{
      var entry=PRON.find(x=>x.fecha===ultima&&norm(x.partido)===norm(p)&&x.nombre===n);
      // Solo mostrar ✓ si tiene un pronóstico real (resultado no vacío)
      if(!entry||!entry.resultado||entry.resultado==="") return "<td class=\"ec-td ec-nd\">&mdash;</td>";
      return "<td class=\"ec-td ec-check\">&#10003;</td>";
    }).join("");
    return "<tr><td class=\"ec-td-nombre\">"+n+"</td>"+celdas+"</tr>";
  }).join("")+"</tbody>";
  document.getElementById("elecciones-table").innerHTML=thead+tbody;
}

function switchTab(tab,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-"+tab).classList.add("active");
  if(tab==="elecciones") renderElecciones();
}
